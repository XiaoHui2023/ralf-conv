name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-ubuntu16:
    name: Linux (Ubuntu 16.04 + staticx)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack in Ubuntu 16.04 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" -w /work \
            ubuntu:16.04 \
            bash tools/ci_pack_ubuntu16.sh

      - name: Fix dist permissions
        run: sudo chown -R "$(id -u):$(id -g)" dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ralf-conv-linux-ubuntu16
          path: |
            dist/ralf-conv
            dist/ralf-conv-*.tar.gz
          if-no-files-found: error

  build-windows:
    name: Windows
    runs-on: windows-latest
    continue-on-error: true
    outputs:
      packed: ${{ steps.pack.outcome == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pack (PyInstaller)
        id: pack
        shell: pwsh
        run: ./tools/ci_pack_windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ralf-conv-windows
          path: |
            dist/ralf-conv.exe
            dist/ralf-conv-*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-linux-ubuntu16
      - build-windows
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/') &&
      needs.build-linux-ubuntu16.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ralf-conv-linux-ubuntu16
          path: release-assets

      - name: Download Windows artifact
        if: needs.build-windows.outputs.packed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ralf-conv-windows
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
          fail_on_unmatched_files: true
