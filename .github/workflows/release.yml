name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-ubuntu16:
    name: Linux (Ubuntu 16.04 + staticx)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack in Ubuntu 16.04 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" -w /work \
            ubuntu:16.04 \
            bash tools/ci_pack_ubuntu16.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ralf-conv-linux-ubuntu16
          path: |
            dist/ralf-conv
            dist/ralf-conv-*.tar.gz
          if-no-files-found: error

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack (PyInstaller)
        shell: pwsh
        run: tools/ci_pack_windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ralf-conv-windows
          path: |
            dist/ralf-conv.exe
            dist/ralf-conv-*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-linux-ubuntu16
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
          fail_on_unmatched_files: true
